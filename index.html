<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strawberry Dot |少女祈祷中</title>
    <style>
        :root {
            --dot-pink: #ffdce5;
            --main-pink: #ffbcc9;
            --soft-white: #ffffff;
            --cream-bg: #fffbfb;
            --accent-peach: #ff9aa2;
            --text-gray: #7d6b6d;
            --border-soft: #ffe5eb;
            --puffy-shadow: 0 12px 25px rgba(255, 188, 201, 0.2);
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--soft-white);
            background-image: radial-gradient(var(--dot-pink) 12%, transparent 13%);
            background-size: 20px 20px;
            padding: 40px 0;
            color: var(--text-gray);
            font-family: 'Hiragino Sans GB', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 680px;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
            position: relative;
            font-family: 'Georgia', serif;
        }

        .header h1 {
            font-size: 2.5rem;
            color: var(--main-pink);
            font-weight: 800;
            letter-spacing: -1.5px;
            margin: 10px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .header p {
            font-size: 0.9rem;
            color: var(--accent-peach);
            background: rgba(255, 255, 255, 0.8);
            padding: 5px 15px;
            border-radius: 50px;
            display: inline-block;
            border: 1px solid var(--border-soft);
        }

        .mode-wrapper {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .mode-btn {
            background: white;
            border: 3px solid var(--border-soft);
            padding: 12px 30px;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.4s;
            color: var(--text-gray);
            font-size: 0.95rem;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .mode-btn.active {
            background: var(--main-pink);
            border-color: var(--main-pink);
            color: white;
            transform: scale(1.05);
            box-shadow: 0 8px 20px rgba(255, 188, 201, 0.4);
        }

        .card {
            background: var(--soft-white);
            border-radius: 40px;
            padding: 35px;
            margin-bottom: 30px;
            border: 4px solid var(--main-pink);
            box-shadow: var(--puffy-shadow);
            position: relative;
            height: auto;
            min-height: fit-content;
            overflow: visible;
        }

        .card-tag {
            position: absolute;
            top: -20px;
            left: 30px;
            background: var(--main-pink);
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            user-select: none;
            transition: 0.3s;
        }

        .card-tag:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 188, 201, 0.3);
        }

        .card-tag .arrow {
            transition: transform 0.3s;
            display: flex;
            align-items: center;
        }

        .card-tag.collapsed .arrow {
            transform: rotate(-90deg);
        }

        .input-item {
            margin-bottom: 25px;
        }

        .input-item label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 10px;
            font-weight: bold;
            color: var(--main-pink);
            padding-left: 5px;
        }

        input, textarea, select {
            width: 100%;
            border: 3px solid var(--border-soft);
            background-color: var(--cream-bg);
            padding: 18px 25px;
            border-radius: 25px;
            outline: none;
            color: var(--text-gray);
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            font-family: inherit;
        }

        input:focus, textarea:focus, select:focus {
            border-color: var(--main-pink);
            background: white;
            transform: scale(1.02);
            box-shadow: 0 5px 15px rgba(255, 188, 201, 0.1);
        }

        .tag-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
            margin-top: 10px;
            max-height: 250px;
            overflow-y: auto;
            padding: 10px 5px;
        }

        .tag-pill {
            background: white;
            border: 2px solid var(--border-soft);
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.3s;
            color: var(--text-gray);
            display: flex;
            align-items: center;
            gap: 5px;
            text-align: center;
            justify-content: center;
        }

        .tag-pill:hover {
            border-color: var(--main-pink);
            background: var(--cream-bg);
            color: var(--main-pink);
            transform: translateY(-2px);
        }

        .category-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 15px;
            background: rgba(255, 188, 201, 0.1);
            border-radius: 20px;
            cursor: pointer;
            margin-bottom: 8px;
            transition: 0.3s;
            user-select: none;
            border: 2px solid var(--border-soft);
        }

        .category-header:hover {
            background: rgba(255, 188, 201, 0.2);
            border-color: var(--main-pink);
        }

        .category-header .title {
            font-size: 0.9rem;
            color: var(--main-pink);
            font-weight: 600;
        }

        .category-header .count {
            font-size: 0.75rem;
            color: var(--accent-peach);
        }

        .category-header .arrow {
            transition: transform 0.3s;
            color: var(--accent-peach);
            display: flex;
            align-items: center;
        }

        .category-header.expanded .arrow {
            transform: rotate(180deg);
        }

        .category-content {
            display: none;
            padding-left: 10px;
            margin-bottom: 10px;
        }

        .category-content.show {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
        }

        .selected-box {
            background: var(--cream-bg);
            border-radius: 30px;
            padding: 20px;
            margin-top: 15px;
            border: 2px dashed var(--main-pink);
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            max-height: 400px;
            overflow-y: auto;
        }

        .selected-item {
            background: var(--main-pink);
            color: white;
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .btn-remove {
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.3);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 16px;
            margin-left: 10px;
            transition: 0.3s;
        }

        .btn-remove:hover {
            background: rgba(255, 255, 255, 0.5);
            transform: rotate(90deg);
        }

        .main-button {
            width: 100%;
            background: linear-gradient(135deg, #ffc2d1 0%, #ff85a2 100%);
            border: none;
            padding: 22px;
            border-radius: 50px;
            color: white;
            font-weight: 900;
            font-size: 1.2rem;
            letter-spacing: 5px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(255, 133, 162, 0.4);
            transition: 0.4s;
            margin: 20px 0;
            position: relative;
            overflow: hidden;
        }

        .main-button:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(255, 133, 162, 0.6);
        }

        .main-button:disabled {
            background: #ddd;
            cursor: not-allowed;
            box-shadow: none;
        }

        .result-panel {
            background: #fffcfd;
            border-radius: 35px;
            padding: 30px;
            line-height: 1.8;
            font-size: 1rem;
            color: var(--text-gray);
            white-space: pre-wrap;
            border: 3px solid var(--border-soft);
            min-height: 200px;
            max-height: 600px;
            overflow-y: auto;
        }

        .typing::after {
            content: "|";
            animation: blink 1s infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        .toggle-container {
            display: flex;
            background: rgba(255, 188, 201, 0.1);
            padding: 4px;
            border-radius: 25px;
            width: fit-content;
            margin-left: auto;
            border: 2px solid var(--border-soft);
        }

        .toggle-item {
            padding: 8px 20px;
            font-size: 0.85rem;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
            color: var(--text-gray);
            font-weight: 600;
        }

        .toggle-item.active {
            background: var(--main-pink);
            color: white;
            box-shadow: 0 4px 12px rgba(255, 188, 201, 0.3);
        }

        .fetch-btn, .save-btn {
            flex: 1;
            padding: 12px 20px;
            border-radius: 25px;
            border: 2px solid var(--border-soft);
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.9rem;
            letter-spacing: 1px;
            font-weight: 600;
            background: var(--dot-pink);
            color: var(--text-gray);
        }

        .fetch-btn:hover, .save-btn:hover {
            background: var(--main-pink);
            color: white;
            transform: translateY(-2px);
        }

        .copy-btn {
            background: var(--dot-pink);
            border: 2px solid var(--border-soft);
            padding: 10px 25px;
            border-radius: 25px;
            color: var(--text-gray);
            font-size: 0.9rem;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
            font-weight: 600;
        }

        .copy-btn:hover {
            background: var(--main-pink);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 188, 201, 0.3);
        }

        .font-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 15px;
            background: rgba(255, 188, 201, 0.1);
            border-radius: 20px;
            margin-bottom: 10px;
            border: 2px solid var(--border-soft);
            transition: 0.3s;
        }

        .font-item:hover {
            background: rgba(255, 188, 201, 0.2);
            transform: translateX(5px);
        }

        .font-info {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .font-name {
            font-size: 0.9rem;
            color: var(--main-pink);
            font-weight: 600;
        }

        .font-preview {
            font-size: 0.85rem;
            color: var(--accent-peach);
            padding: 4px 10px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 15px;
        }

        .font-actions {
            display: flex;
            gap: 8px;
        }

        .font-btn {
            padding: 6px 12px;
            border-radius: 15px;
            border: 2px solid var(--border-soft);
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.3s;
            font-weight: 600;
        }

        .font-btn-apply {
            background: linear-gradient(135deg, #e8f5e9, #e0f2f1);
            color: #5d8a66;
        }

        .font-btn-apply:hover {
            background: linear-gradient(135deg, #c8e6c9, #b2dfdb);
            transform: translateY(-1px);
        }

        .font-btn-delete {
            background: linear-gradient(135deg, #ffebee, #fce4ec);
            color: #c4886c;
        }

        .font-btn-delete:hover {
            background: linear-gradient(135deg, #ffcdd2, #f8bbd9);
            transform: translateY(-1px);
        }

        .font-btn.active {
            background: linear-gradient(135deg, #c8e6c9, #b2dfdb);
            color: #2e7d32;
            font-weight: 700;
        }

        .panel-content {
            overflow: hidden;
            transition: max-height 0.3s ease-out;
        }

        .panel-content.collapsed {
            max-height: 0 !important;
        }

        .svg-icon {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2.5;
            vertical-align: middle;
        }

        .sparkle-decor {
            position: absolute;
            color: var(--main-pink);
            opacity: 0.6;
            pointer-events: none;
        }

        footer {
            text-align: center;
            padding: 40px;
            color: var(--main-pink);
            font-size: 0.8rem;
            letter-spacing: 2px;
        }

        .announcement-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.5s ease-out;
        }

        .announcement-overlay.hidden {
            display: none;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .announcement-modal {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.95) 0%, rgba(255, 220, 229, 0.95) 100%);
            border: 4px solid var(--main-pink);
            border-radius: 40px;
            padding: 40px 35px;
            max-width: 420px;
            width: 90%;
            animation: slideUp 0.5s ease-out;
            text-align: center;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px) scale(0.95); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .announcement-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #ffc2d1, #ff85a2);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            box-shadow: 0 8px 20px rgba(255, 133, 162, 0.4);
        }

        .announcement-title {
            font-size: 1.5rem;
            color: var(--main-pink);
            letter-spacing: 3px;
            margin-bottom: 25px;
            font-weight: 800;
        }

        .announcement-content {
            text-align: left;
            margin-bottom: 30px;
        }

        .announcement-item {
            display: flex;
            align-items: flex-start;
            margin-bottom: 15px;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 20px;
            border-left: 4px solid var(--main-pink);
            transition: 0.3s;
        }

        .announcement-item:hover {
            background: rgba(255, 255, 255, 0.9);
            transform: translateX(5px);
        }

        .announcement-bullet {
            color: var(--main-pink);
            margin-right: 10px;
            font-size: 0.9rem;
            flex-shrink: 0;
        }

        .announcement-text {
            color: var(--text-gray);
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .announcement-btn {
            background: linear-gradient(135deg, #ffc2d1, #ff85a2);
            border: none;
            padding: 14px 50px;
            border-radius: 50px;
            color: white;
            font-size: 1rem;
            letter-spacing: 3px;
            cursor: pointer;
            transition: 0.4s;
            box-shadow: 0 8px 20px rgba(255, 133, 162, 0.4);
            font-weight: 700;
        }

        .announcement-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(255, 133, 162, 0.6);
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--main-pink); border-radius: 10px; }

        @media (max-width: 600px) {
            .header h1 { font-size: 1.8rem; }
            .container { padding: 20px 15px; }
            .card { padding: 25px; }
        }
    </style>
</head>
<body>

<div class="announcement-overlay" id="announcementOverlay">
    <div class="announcement-modal">
        <div class="announcement-icon">✧</div>
        <div class="announcement-title">温馨提示</div>
        <div class="announcement-content">
            <div class="announcement-item">
                <span class="announcement-bullet">✦</span>
                <span class="announcement-text">本站内容仅供娱乐，请勿过度迷信</span>
            </div>
            <div class="announcement-item">
                <span class="announcement-bullet">✦</span>
                <span class="announcement-text">作者不承担任何因使用本站产生的责任</span>
            </div>
            <div class="announcement-item">
                <span class="announcement-bullet">✦</span>
                <span class="announcement-text">解牌答案不会保存，请自行复制到备忘录里</span>
            </div>
                        <div class="announcement-item">
                <span class="announcement-bullet">✦</span>
                <span class="announcement-text">链接api即可使用，不清楚api是什么善用搜索哦</span>
            </div>
                        <div class="announcement-item">
                <span class="announcement-bullet">✦</span>
                <span class="announcement-text">禁止二传倒卖，作者小鼠，免费分享，仅发布于社区和小红书</span>
            </div>
        </div>
        <button class="announcement-btn" onclick="closeAnnouncement()">我已知晓</button>
    </div>
</div>

<div class="container">
    <header class="header">
        <svg class="sparkle-decor" style="top:-20px; left:10%;" width="30" height="30" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.4 7.6L22 12l-7.6 2.4L12 22l-2.4-7.6L2 12l7.6-2.4L12 2z"/></svg>
        <svg class="sparkle-decor" style="bottom:-10px; right:15%;" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2l2.4 7.6L22 12l-7.6 2.4L12 22l-2.4-7.6L2 12l7.6-2.4L12 2z"/></svg>

        <h1>
            <svg class="svg-icon" style="width:40px; height:40px; color:var(--main-pink)" viewBox="0 0 24 24">
                <path d="M12 7c2.5-3.5 5-4 7-3s2 3.5-1 6.5L12 17l-6-6.5C3 7.5 3 5 5 4s4.5-.5 7 3z" stroke="none" fill="currentColor"/>
            </svg>
            Peach Tarot
        </h1>
        <p>每一抽都是粉色的心动</p>
    </header>

    <div class="mode-wrapper">
        <button class="mode-btn active" onclick="switchMode('tarot', this)">塔罗牌解读</button>
        <button class="mode-btn" onclick="switchMode('lenormand', this)">雷诺曼解读</button>
    </div>

    <div class="card">
        <div class="card-tag" onclick="togglePanel(this)">
            <svg class="svg-icon" viewBox="0 0 24 24"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
            星核密钥
            <span class="arrow"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg></span>
        </div>
        <div class="panel-content">
            <div class="input-item">
                <label>API 枢纽地址</label>
                <input type="text" id="apiEndpoint" placeholder="https://api.openai.com/v1">
            </div>
            <div style="display: flex; gap: 20px;">
                <div class="input-item" style="flex:1">
                    <label>身份密钥</label>
                    <input type="password" id="apiKey" placeholder="sk-...">
                </div>
                <div class="input-item" style="flex:1">
                    <label>选择契合模型</label>
                    <select id="modelName">
                        <option value="">-- 点击拉取模型 --</option>
                    </select>
                </div>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <button class="fetch-btn" onclick="fetchModels()">拉取模型列表</button>
                <button class="save-btn" onclick="saveConfig()">保存配置</button>
            </div>
            
            <div style="margin-top: 30px; padding-top: 20px; border-top: 2px dashed var(--border-soft);">
                <div class="input-item">
                    <label>自定义字体（除标题外全局应用）</label>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <input type="file" id="fontFileInput" accept=".ttf,.otf,.woff,.woff2" style="display: none;" onchange="handleFontUpload(event)">
                        <button class="fetch-btn" onclick="document.getElementById('fontFileInput').click()" style="flex: 1;">
                            选择字体文件
                        </button>
                    </div>
                </div>
                <div id="fontList" style="margin-top: 15px;"></div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="card-tag" onclick="togglePanel(this)">

<script>
    const tarotCategories = {
        '大阿卡纳': ['愚者', '魔术师', '女祭司', '皇后', '皇帝', '教皇', '恋人', '战车', '力量', '隐士', '命运之轮', '正义', '倒吊人', '死神', '节制', '恶魔', '塔', '星星', '月亮', '太阳', '审判', '世界'],
        '权杖': ['权杖Ace', '权杖二', '权杖三', '权杖四', '权杖五', '权杖六', '权杖七', '权杖八', '权杖九', '权杖十', '权杖侍从', '权杖骑士', '权杖王后', '权杖国王'],
        '圣杯': ['圣杯Ace', '圣杯二', '圣杯三', '圣杯四', '圣杯五', '圣杯六', '圣杯七', '圣杯八', '圣杯九', '圣杯十', '圣杯侍从', '圣杯骑士', '圣杯王后', '圣杯国王'],
        '宝剑': ['宝剑Ace', '宝剑二', '宝剑三', '宝剑四', '宝剑五', '宝剑六', '宝剑七', '宝剑八', '宝剑九', '宝剑十', '宝剑侍从', '宝剑骑士', '宝剑王后', '宝剑国王'],
        '钱币': ['钱币Ace', '钱币二', '钱币三', '钱币四', '钱币五', '钱币六', '钱币七', '钱币八', '钱币九', '钱币十', '钱币侍从', '钱币骑士', '钱币王后', '钱币国王']
    };
    const lenormandCategories = {
        '人物牌': ['骑士', '孩子', '狐狸', '熊', '鹳鸟', '狗', '塔', '山', '十字路口', '老鼠', '男人', '女人', '百合', '鱼'],
        '事件牌': ['幸运草', '船', '树', '云', '蛇', '棺材', '花束', '镰刀', '鞭子', '鸟', '星星', '心', '戒指', '书', '信', '太阳', '月亮', '钥匙', '锚', '十字架'],
        '环境牌': ['房屋', '花园']
    };

    const tarotData = Object.values(tarotCategories).flat();
    const lenormandData = Object.values(lenormandCategories).flat();

    let currentMode = 'tarot';
    let currentOrientation = 'upright';
    let chosenCards = [];
    let significator = null;
    let db = null;
    let currentFontName = null;

    function initDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open('TarotFontDB', 1);
            
            request.onerror = () => reject(request.error);
            request.onsuccess = () => {
                db = request.result;
                resolve(db);
            };
            
            request.onupgradeneeded = (event) => {
                const database = event.target.result;
                if (!database.objectStoreNames.contains('fonts')) {
                    database.createObjectStore('fonts', { keyPath: 'name' });
                }
            };
        });
    }

    async function saveFontToDB(fontData) {
        return new Promise((resolve, reject) => {
            const transaction = db.transaction(['fonts'], 'readwrite');
            const store = transaction.objectStore('fonts');
            const request = store.put(fontData);
            
            request.onsuccess = () => resolve();
            request.onerror = () => reject(request.error);
        });
    }

    async function getFontFromDB(fontName) {
        return new Promise((resolve, reject) => {
            const transaction = db.transaction(['fonts'], 'readonly');
            const store = transaction.objectStore('fonts');
            const request = store.get(fontName);
            
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
    }

    async function getAllFontsFromDB() {
        return new Promise((resolve, reject) => {
            const transaction = db.transaction(['fonts'], 'readonly');
            const store = transaction.objectStore('fonts');
            const request = store.getAll();
            
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => reject(request.error);
        });
    }

    async function deleteFontFromDB(fontName) {
        return new Promise((resolve, reject) => {
            const transaction = db.transaction(['fonts'], 'readwrite');
            const store = transaction.objectStore('fonts');
            const request = store.delete(fontName);
            
            request.onsuccess = () => resolve();
            request.onerror = () => reject(request.error);
        });
    }

    function closeAnnouncement() {
        const overlay = document.getElementById('announcementOverlay');
        overlay.style.animation = 'fadeIn 0.3s ease-out reverse';
        setTimeout(() => {
            overlay.classList.add('hidden');
        }, 300);
    }

    function init() {
        loadConfig();
        renderPool();
        setTimeout(initPanels, 100);
        
        initDB().then(async () => {
            await renderFontList();
            await loadActiveFont();
        }).catch(err => {
            console.error('Failed to initialize database:', err);
        });
    }

    function loadConfig() {
        const saved = localStorage.getItem('tarotApiConfig');
        if (saved) {
            const config = JSON.parse(saved);
            document.getElementById('apiEndpoint').value = config.endpoint || '';
            document.getElementById('apiKey').value = config.key || '';
            if (config.models && config.models.length > 0) {
                const select = document.getElementById('modelName');
                select.innerHTML = config.models.map(m => 
                    `<option value="${m}" ${m === config.selectedModel ? 'selected' : ''}>${m}</option>`
                ).join('');
            }
        }
    }

    function saveConfig() {
        const config = {
            endpoint: document.getElementById('apiEndpoint').value,
            key: document.getElementById('apiKey').value,
            selectedModel: document.getElementById('modelName').value,
            models: Array.from(document.getElementById('modelName').options).map(o => o.value).filter(v => v)
        };
        localStorage.setItem('tarotApiConfig', JSON.stringify(config));
        alert('配置已保存！');
    }

    async function fetchModels() {
        const endpoint = document.getElementById('apiEndpoint').value;
        const key = document.getElementById('apiKey').value;
        
        if (!endpoint || !key) {
            alert('请先填写 API Endpoint 和 API Key');
            return;
        }

        const select = document.getElementById('modelName');
        select.innerHTML = '<option value="">正在拉取...</option>';

        try {
            const baseUrl = endpoint.replace(/\/$/, '');
            const modelsUrl = baseUrl + '/models';
            
            const response = await fetch(modelsUrl, {
                method: 'GET',
                headers: {
                    'Authorization': `Bearer ${key}`
                }
            });

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}`);
            }

            const data = await response.json();
            const models = data.data || data.models || [];
            
            if (models.length === 0) {
                select.innerHTML = '<option value="">未找到模型</option>';
                return;
            }

            const sortedModels = models.sort((a, b) => (a.id || a).localeCompare(b.id || b));
            select.innerHTML = sortedModels.map(m => {
                const id = m.id || m;
                return `<option value="${id}">${id}</option>`;
            }).join('');

        } catch (err) {
            select.innerHTML = '<option value="">拉取失败</option>';
            alert('拉取模型失败：' + err.message + '\n请确认 Endpoint 格式正确（如: https://api.openai.com/v1）');
        }
    }

    function renderPool() {
        const pool = document.getElementById('cardPool');
        const categories = currentMode === 'tarot' ? tarotCategories : lenormandCategories;
        
        pool.innerHTML = Object.entries(categories).map(([name, cards], index) => `
            <div class="category-section">
                <div class="category-header" onclick="toggleCategory(this)">
                    <div>
                        <span class="title">${name}</span>
                        <span class="count">(${cards.length})</span>
                    </div>
                    <span class="arrow"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg></span>
                </div>
                <div class="category-content">
                    ${cards.map(card => `<div class="tag-pill" onclick="addCard('${card}')">${card}</div>`).join('')}
                </div>
            </div>
        `).join('');
    }

    function toggleCategory(header) {
        header.classList.toggle('expanded');
        const content = header.nextElementSibling;
        content.classList.toggle('show');
        
        requestAnimationFrame(() => {
            const panelContent = header.closest('.panel-content');
            if (panelContent && !panelContent.classList.contains('collapsed')) {
                panelContent.style.maxHeight = panelContent.scrollHeight + 'px';
            }
        });
    }

    function togglePanel(title) {
        title.classList.toggle('collapsed');
        const content = title.nextElementSibling;
        content.classList.toggle('collapsed');
    }

    function initPanels() {
        document.querySelectorAll('.panel-content').forEach(content => {
            requestAnimationFrame(() => {
                content.style.maxHeight = content.scrollHeight + 'px';
            });
        });
    }

    function switchMode(mode, btn) {
        currentMode = mode;
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        chosenCards = [];
        significator = null;
        updateSelectedView();
        renderPool();
        
        const orientationSection = document.getElementById('orientationSection');
        orientationSection.style.display = mode === 'tarot' ? 'flex' : 'none';
        
        const significatorSection = document.getElementById('significatorSection');
        significatorSection.style.display = mode === 'lenormand' ? 'block' : 'none';
        
        if (mode === 'lenormand') {
            renderSignificatorPool();
        }
        updateSignificatorDisplay();
    }

    function renderSignificatorPool() {
        const pool = document.getElementById('significatorPool');
        pool.innerHTML = Object.entries(lenormandCategories).map(([name, cards]) => `
            <div class="category-section">
                <div class="category-header" onclick="toggleCategory(this)">
                    <div>
                        <span class="title">${name}</span>
                        <span class="count">(${cards.length})</span>
                    </div>
                    <span class="arrow"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg></span>
                </div>
                <div class="category-content">
                    ${cards.map(card => `<div class="tag-pill" onclick="setSignificator('${card}')">${card}</div>`).join('')}
                </div>
            </div>
        `).join('');
    }

    function setSignificator(name) {
        significator = name;
        updateSignificatorDisplay();
    }

    function clearSignificator() {
        significator = null;
        updateSignificatorDisplay();
    }

    function updateSignificatorDisplay() {
        const display = document.getElementById('significatorDisplay');
        const nameEl = document.getElementById('significatorName');
        if (significator) {
            nameEl.textContent = significator;
            display.style.display = 'block';
        } else {
            display.style.display = 'none';
        }
    }

    function setOrientation(type) {
        currentOrientation = type;
        document.getElementById('uprightBtn').classList.toggle('active', type === 'upright');
        document.getElementById('reversedBtn').classList.toggle('active', type === 'reversed');
    }

    function addCard(name) {
        const suffix = currentMode === 'tarot' ? (currentOrientation === 'upright' ? '(正位)' : '(逆位)') : '';
        chosenCards.push(`${name}${suffix}`);
        updateSelectedView();
    }

    function removeCard(index) {
        chosenCards.splice(index, 1);
        updateSelectedView();
    }

    function updateSelectedView() {
        const container = document.getElementById('selectedContainer');
        if (chosenCards.length === 0) {
            container.innerHTML = `<div style="color:#ccc; font-size:0.8rem; text-align:center; width:100%;">尚未选择任何卡牌</div>`;
        } else {
            container.innerHTML = chosenCards.map((name, i) => `
                <div class="selected-item">
                    <span>${name}</span>
                    <div class="btn-remove" onclick="removeCard(${i})">×</div>
                </div>
            `).join('');
        }
        
        requestAnimationFrame(() => {
            const panelContent = container.closest('.panel-content');
            if (panelContent && !panelContent.classList.contains('collapsed')) {
                panelContent.style.maxHeight = panelContent.scrollHeight + 'px';
            }
        });
    }

    async function deliverFate() {
        const endpoint = document.getElementById('apiEndpoint').value;
        const key = document.getElementById('apiKey').value;
        const model = document.getElementById('modelName').value;
        const resultArea = document.getElementById('resultContent');

        if (!endpoint || !key || !model || chosenCards.length === 0) {
            alert('请填写完整配置并至少选择一张牌');
            return;
        }

        const divineBtn = document.getElementById('divineBtn');
        divineBtn.disabled = true;
        resultArea.innerHTML = "正在感应星辰的指引...";

        try {
            const baseUrl = endpoint.replace(/\/$/, '');
            const chatUrl = baseUrl + '/chat/completions';
            
            const response = await fetch(chatUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${key}`
                },
                body: JSON.stringify({
                    model: model,
                    messages: [{
                        role: "system",

                    }, {
                        role: "user",
                        content: buildPrompt()
                    }]
                })
            });

            const data = await response.json();
            const text = data.choices[0].message.content;

            resultArea.innerHTML = "";
            typeWriter(text, resultArea);
        } catch (err) {
            resultArea.innerHTML = "连接星辰时发生了错误：" + err.message;
        } finally {
            divineBtn.disabled = false;
        }
    }

【第一步：理解问题】

对于每张牌，你需要：

   - 哪个元素溢出？（过多则该领域成为焦点或过度）
   - 哪个元素缺失？（缺少则该领域被忽视或不足）
2. 整体走向判断：
   - 大阿卡纳比例高：重大人生课题、灵性指引、命运转折
   - 宫廷牌比例高：涉及具体人物、人际关系
   - 小牌比例高：日常事务、具体事件
   - 正位与逆位比例：整体能量流动方向
3. 牌面叙事：将所有牌串联成一个完整的故事线

【第四步：单张牌解读】
请对每张牌进行详细解读，包括：
- 牌面核心含义（正位/逆位不同）
- 元素与数字的深层影响
- 与问题的关联性
- 在牌阵中的位置意义

【第五步：综合解读】
整合所有信息，给出针对问题的完整解读和建议。

【第六步：自我检视】（在输出解读前，请内心确认以下几点）
1. 我的解读是否过于依赖刻板印象？是否考虑了每张牌在具体情境下的独特含义？
2. 我的解读是否真正回应了提问者的问题和背景？还是泛泛而谈？
3. 我是否保持了客观中立？没有因个人喜好而偏向某种解读？
4. 如果解读结果并不美好，我是否如实告知？还是为了照顾提问者心情而扭曲或美化事实？

请记住：真实的解读比美好的谎言更有价值。即使答案令人不安，也请诚实、温和地传达。

【输出格式要求】
- 不要输出你的思考过程、分析步骤或思维链
- 直接输出最终的解读结果
- 使用以下格式让排版美观：
  - 使用「」符号标注牌名
  - 使用 ═══ 或 ─── 作为分隔线
  - 使用 ◆ ◇ ● ○ ★ ☆ 等符号装饰
  - 每个部分之间空一行
  - 重要内容可使用【】标注

请用温柔而专业的语言进行解读，排版清晰，层次分明，直接给出解读结果。`;
        } else {
            prompt = `你是一位精通雷诺曼牌解读的专业占卜师。请按照以下要求进行解读：

【问题】
${question || '（未提供具体问题，请进行通用解读）'}
${background ? `\n【背景补充】\n${background}` : ''}

【牌组信息】`;
            if (significator) {
                prompt += `\n指示牌：${significator}（代表问卜者/问题核心）`;
            }
            prompt += `\n牌组：${chosenCards.join('、')}

请结合指示牌的含义来解读整体牌阵（如有），并针对问题给出专业解读。

请用温柔而专业的语言进行解读，排版清晰，层次分明。`;
        }
        return prompt;
    }

    function typeWriter(text, element) {
        let i = 0;
        element.classList.add('typing');
        function typing() {
            if (i < text.length) {
                element.innerHTML += text.charAt(i);
                i++;
                setTimeout(typing, 30);
            } else {
                element.classList.remove('typing');
            }
        }
        typing();
    }

    function copyResult(event) {
        const resultContent = document.getElementById('resultContent');
        const text = resultContent.innerText || resultContent.textContent;
        
        if (text === '等待您的开启...') {
            alert('暂无解读结果可复制');
            return;
        }
        
        navigator.clipboard.writeText(text).then(() => {
            const btn = event.target;
            const originalText = btn.textContent;
            btn.textContent = '已复制！';
            btn.style.background = 'var(--main-pink)';
            
            setTimeout(() => {
                btn.textContent = originalText;
                btn.style.background = '';
            }, 2000);
        }).catch(err => {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.style.position = 'fixed';
            textarea.style.opacity = '0';
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            
            const btn = event.target;
            const originalText = btn.textContent;
            btn.textContent = '已复制！';
            setTimeout(() => {
                btn.textContent = originalText;
            }, 2000);
        });
    }

    async function handleFontUpload(event) {
        const file = event.target.files[0];
        if (!file) return;
        
        const fontName = file.name.replace(/\.(ttf|otf|woff|woff2)$/i, '');
        
        try {
            const reader = new FileReader();
            reader.onload = async (e) => {
                const fontData = {
                    name: fontName,
                    data: e.target.result,
                    type: file.name.split('.').pop().toLowerCase()
                };
                
                await saveFontToDB(fontData);
                await renderFontList();
                
                const fileInput = document.getElementById('fontFileInput');
                fileInput.value = '';
                
                alert(`字体 "${fontName}" 上传成功！`);
            };
            reader.readAsDataURL(file);
        } catch (err) {
            alert('字体上传失败：' + err.message);
        }
    }

    async function applyFont(fontName) {
        try {
            const fontData = await getFontFromDB(fontName);
            if (!fontData) {
                alert('字体数据未找到');
                return;
            }
            
            const fontFace = new FontFace(fontName, `url(${fontData.data})`);
            await fontFace.load();
            document.fonts.add(fontFace);
            
            currentFontName = fontName;
            
            document.body.style.fontFamily = `'${fontName}', 'Hiragino Sans GB', 'PingFang SC', 'Microsoft YaHei', sans-serif`;
            
            const savedConfig = localStorage.getItem('tarotApiConfig');
            const config = savedConfig ? JSON.parse(savedConfig) : {};
            config.activeFont = fontName;
            localStorage.setItem('tarotApiConfig', JSON.stringify(config));
            
            await renderFontList();
        } catch (err) {
            alert('字体应用失败：' + err.message);
        }
    }

    async function deleteFont(fontName, event) {
        event.stopPropagation();
        
        if (!confirm(`确定要删除字体 "${fontName}" 吗？`)) {
            return;
        }
        
        try {
            await deleteFontFromDB(fontName);
            
            if (currentFontName === fontName) {
                currentFontName = null;
                document.body.style.fontFamily = "'Hiragino Sans GB', 'PingFang SC', 'Microsoft YaHei', sans-serif";
                
                const savedConfig = localStorage.getItem('tarotApiConfig');
                const config = savedConfig ? JSON.parse(savedConfig) : {};
                delete config.activeFont;
                localStorage.setItem('tarotApiConfig', JSON.stringify(config));
            }
            
            await renderFontList();
        } catch (err) {
            alert('字体删除失败：' + err.message);
        }
    }

    async function renderFontList() {
        const fontList = document.getElementById('fontList');
        const fonts = await getAllFontsFromDB();
        
        if (fonts.length === 0) {
            fontList.innerHTML = '<div style="color: #ccc; font-size: 0.8rem; text-align: center; padding: 20px;">暂无自定义字体</div>';
            return;
        }
        
        fontList.innerHTML = fonts.map(font => `
            <div class="font-item">
                <div class="font-info">
                    <span class="font-name">${font.name}</span>
                    <span class="font-preview" style="font-family: '${font.name}', sans-serif;">预览文本</span>
                </div>
                <div class="font-actions">
                    <button class="font-btn font-btn-apply ${currentFontName === font.name ? 'active' : ''}" onclick="applyFont('${font.name}')">
                        ${currentFontName === font.name ? '已应用' : '应用'}
                    </button>
                    <button class="font-btn font-btn-delete" onclick="deleteFont('${font.name}', event)">删除</button>
                </div>
            </div>
        `).join('');
        
        for (const font of fonts) {
            try {
                const fontFace = new FontFace(font.name, `url(${font.data})`);
                await fontFace.load();
                document.fonts.add(fontFace);
            } catch (err) {
                console.error(`Failed to load font ${font.name}:`, err);
            }
        }
    }

    async function loadActiveFont() {
        const savedConfig = localStorage.getItem('tarotApiConfig');
        if (!savedConfig) return;
        
        const config = JSON.parse(savedConfig);
        if (!config.activeFont) return;
        
        try {
            const fontData = await getFontFromDB(config.activeFont);
            if (!fontData) return;
            
            const fontFace = new FontFace(fontData.name, `url(${fontData.data})`);
            await fontFace.load();
            document.fonts.add(fontFace);
            
            currentFontName = fontData.name;
            document.body.style.fontFamily = `'${fontData.name}', 'Hiragino Sans GB', 'PingFang SC', 'Microsoft YaHei', sans-serif`;
        } catch (err) {
            console.error('Failed to load active font:', err);
        }
    }

    init();
</script>
